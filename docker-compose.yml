services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: caretta
      POSTGRES_PASSWORD: caretta
      POSTGRES_DB: carettaid
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caretta -d carettaid"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://caretta:caretta@db:5432/carettaid
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

volumes:
  db_data:
  uploads:
